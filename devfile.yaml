schemaVersion: 2.2.2
metadata:
  name: ollama
  displayName: Ollama
  description: Get up and running with large language models with Ollama, Continue, Llama3, and StarCoder2
  icon: https://ollama.com/public/ollama.png
  tags:
    - Ollama
    - Continue
    - Llama3
    - Starcoder2
  projectType: universal
  language: Polyglot
  version: 1.0.0

projects:
  - name: cde-ollama-continue
    git:
      remotes:
        origin: https://github.com/redhat-developer-demos/cde-ollama-continue
      checkoutFrom:
        revision: main

components:
  - name: udi
    container:
      image: quay.io/devfile/universal-developer-image:ubi9-latest
      memoryLimit: 4Gi
      memoryRequest: 2Gi
      cpuLimit: 4000m
      cpuRequest: 1000m
      mountSources: true
      sourceMapping: /projects

  - name: ollama
    container:
      image: docker.io/ollama/ollama:0.5.4
      # Hier wird der Server beim Start aktiviert
      command: ["/bin/sh", "-c", "ollama serve"] 
      mountSources: true
      sourceMapping: /.ollama
      resources:
        limits:
          cpu: 4000m
          memory: 12Gi
        requests:
          cpu: 1000m
          memory: 8Gi

commands:
  - id: pullmodel
    exec:
      component: ollama
      # Wartet kurz, bis der Server auf Port 11434 reagiert
      commandLine: "sleep 15 && ollama pull llama3:8b" 
      
  - id: pullautocompletemodel
    exec:
      component: ollama
      commandLine: "ollama pull starcoder2:3b"
      
  - id: copyconfig
    exec:
      component: udi
      commandLine: "mkdir -p /home/user/.continue && cp /projects/cde-ollama-continue/continue-config.json /home/user/.continue/config.json"

events:
  postStart:
    - pullmodel
    - pullautocompletemodel
    - copyconfig
